<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* === DESIGN TOKENS === */
    :root {
      --bg: #eef0f4;
      --surface: #ffffff;
      --surface-muted: #f7f8fa;
      --border: #e7eaef;
      --border-strong: #d6dae1;
      --text: #1c2330;
      --text-muted: #6b7686;
      --text-soft: #9aa3b2;
      --accent: #2f6df6;
      --accent-hover: #1d5be0;
      --accent-soft: #ebf2ff;
      --accent-border: #c9dcff;
      --green: #15a34a;
      --green-soft: #e9f8ef;
      --amber: #c77514;
      --amber-soft: #fdf2e3;
      --teal: #0d9488;
      --teal-soft: #e4f6f3;
      --violet: #6d4ed6;
      --violet-soft: #f1ecfd;
      --radius: 14px;
      --radius-md: 10px;
      --radius-sm: 7px;
      --shadow-sm: 0 1px 2px rgba(20,28,45,.04), 0 1px 3px rgba(20,28,45,.05);
      --shadow-md: 0 6px 20px rgba(20,28,45,.07);
      --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    }

    /* === RESET === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }

    /* === LAYOUT === */
    .app {
      max-width: 1400px;
      height: calc(100vh - 32px);
      margin: 16px auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header, .tabs { flex: 0 0 auto; }

    /* === HEADER === */
    .header {
      background: var(--surface);
      color: var(--text);
      padding: 14px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .header h1::before {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }
    .header-actions { display: flex; gap: 8px; }

    /* === TABS === */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 18px; }
    .tab-btn {
      padding: 13px 16px;
      border: none; background: transparent; cursor: pointer;
      font-family: var(--font);
      font-size: 13px; font-weight: 600; color: var(--text-muted);
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* === TAB CONTENT === */
    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    #dashboard.tab-panel.active { overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* === TRACKER LAYOUT: sticky sidebar + scrollable calendar === */
    .tracker-body {
      display: flex;
      align-items: stretch;
      gap: 0;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* LEFT PANEL: sticky, scrolls independently */
    .left-panel {
      flex: 0 0 172px;
      position: sticky;
      top: 0;
      max-height: 100vh;
      overflow-y: auto;
      background: var(--surface-muted);
      border-right: 1px solid var(--border);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* CENTER PANEL: flex layout for records + calendar side-by-side */
    .center-panel {
      flex: 1;
      min-width: 0;  /* prevents flex overflow */
      min-height: 0;
      padding: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* === BUTTONS === */
    .btn {
      padding: 9px 16px; border: 1px solid transparent; border-radius: var(--radius-sm);
      cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600;
      letter-spacing: -0.01em; transition: background .15s, border-color .15s, transform .05s;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-sm { padding: 7px 12px; font-size: 12px; }
    .btn-secondary { background: var(--surface); color: var(--text-muted); border-color: var(--border-strong); }
    .btn-secondary:hover { background: var(--surface-muted); color: var(--text); border-color: var(--text-soft); }

    /* === FORM ELEMENTS === */
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; }
    input[type="text"],
    input[type="number"],
    input[type="date"] {
      padding: 9px 11px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      background: var(--surface);
      width: 100%;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    input::placeholder { color: var(--text-soft); }

    /* === CALENDAR NAV & STATS BAR === */
    .calendar-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .calendar-nav h2 { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }

    .stats-bar {
      display: flex;
      gap: 8px;
      padding: 10px 18px;
      background: var(--surface-muted);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stat-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface);
      padding: 5px 11px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-weight: 600;
    }

    /* === CONTENT WRAPPER: records + calendar side-by-side === */
    .content-wrapper {
      display: flex;
      gap: 0;
      flex: 1;
      min-width: 0;
      min-height: 0;
    }

    /* === CALENDAR GRID ===
       KEY: no height:100vh, no overflow:hidden on parents.
       Cells use min-height only — they grow to fit content.
    */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: auto;          /* header row: content height */
      grid-auto-rows: minmax(0, 1fr);    /* week rows split height evenly */
      border-left: 1px solid var(--border);
      border-top: 1px solid var(--border);
      flex: 1;
      min-width: 0;
      min-height: 0;
    }

    .cal-header-cell {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-soft);
      padding: 7px 4px;
      background: var(--surface-muted);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .cal-cell {
      min-height: 0;              /* fills its grid row; scrolls if overcrowded */
      overflow-y: auto;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 5px;
      background: var(--surface);
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: background .12s;
    }
    /* slim scrollbar inside crowded cells */
    .cal-cell::-webkit-scrollbar { width: 5px; }
    .cal-cell::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
    /* cell contents keep their height and scroll instead of squishing */
    .cal-cell > * { flex-shrink: 0; }
    .cal-cell:not(.empty):hover { background: var(--surface-muted); }

    .cal-cell.today { background: var(--accent-soft); }
    .cal-cell.empty { background: var(--surface-muted); }

    /* drop target highlight */
    .cal-cell.drag-over { background: var(--accent-soft); outline: 2px dashed var(--accent); outline-offset: -2px; }

    .cal-day-num {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 1px;
      line-height: 1;
      flex-shrink: 0;
      display: flex;
      gap: 2px;
      align-items: center;
      width: 100%;
    }

    .cal-day-num > div:first-child {
      flex-shrink: 0;
    }

    .cal-body-data {
      font-size: 10px;
      color: var(--text);
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      text-align: center;
      flex: 1;
      font-variant-numeric: tabular-nums;
    }
    .cal-cell.today .cal-day-num {
      width: 100%;
      font-size: 11px;
    }

    .cal-cell.today .cal-day-num > div:first-child {
      background: var(--accent);
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-weight: 700;
    }

    .ex-detail-row { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; padding: 2px 0; }
    .ex-detail-text { color: var(--text-muted); }
    .ex-detail-empty { font-size: 12px; color: var(--text-muted); }

    .cal-exercise-icons {
      display: flex;
      flex-direction: column;
      gap: 2px;
      width: 100%;
    }
    .cal-ex-badge {
      display: block;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
      width: 100%;
      text-align: center;
      box-sizing: border-box;
    }
    /* exercise type colors — tracker badges use light tints */
    .cal-ex-badge.ex-muscle { background: #fdecec; border-color: #f5cccc; color: #cf3a3a; }
    .cal-ex-badge.ex-cardio { background: #eaf1ff; border-color: #c9dcff; color: #2f6df6; }
    .cal-ex-badge.ex-hiit   { background: #fce9f5; border-color: #f1c8e4; color: #c81f93; }

    /* Task cards inside calendar cells */
    .cal-task-chip {
      display: block;
      background: var(--accent-soft);
      border: 1px solid var(--accent-border);
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 9px;
      color: var(--accent-hover);
      font-weight: 600;
      cursor: grab;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      box-sizing: border-box;
    }
    .cal-task-chip:hover { background: #ddeaff; }
    .cal-task-chip.dragging { opacity: 0.4; }
    .cal-task-chip.completed {
      background: var(--green-soft);
      border-color: #bce8cd;
      color: var(--green);
    }
    .cal-task-chip.completed::before {
      content: '✓ ';
      font-weight: 700;
      margin-right: 2px;
    }

    /* === DELETE ZONE === */
    .delete-zone {
      display: none;
    }

    /* === CONTEXT MENU === */
    .context-menu {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      z-index: 10000;
      min-width: 150px;
      padding: 5px;
      display: none;
    }
    .context-menu.show {
      display: block;
    }
    .context-menu-item {
      padding: 9px 12px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      width: 100%;
      text-align: left;
      color: var(--text);
      transition: background 0.1s, color 0.1s;
    }
    .context-menu-item:hover,
    .context-menu-item.selected {
      background: var(--accent-soft);
      color: var(--accent-hover);
    }

    /* === TASK PANEL === */
    .task-section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
      padding: 4px 2px 6px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .task-section-title::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 2px;
      background: currentColor;
    }
    .task-section-title.idea { color: var(--amber); }
    .task-section-title.scheduled { color: var(--accent); }
    .task-section-title.completed { color: var(--green); }

    .task-input-row {
      display: flex;
      gap: 5px;
      margin-bottom: 6px;
    }
    .task-input-row input {
      flex: 1;
      padding: 7px 9px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 12px;
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }
    .task-input-row input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .task-input-row button {
      padding: 7px 11px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      line-height: 1;
      transition: background .15s;
    }
    .task-input-row button:hover { background: var(--accent-hover); }

    .task-pool {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-height: 20px;
      margin-bottom: 4px;
    }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--amber);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      cursor: grab;
      user-select: none;
      box-shadow: var(--shadow-sm);
      transition: box-shadow .15s, transform .05s;
    }
    .task-card:hover { box-shadow: var(--shadow-md); }
    .task-card:active { transform: scale(0.99); }
    .task-card.dragging { opacity: 0.4; }
    .task-card.scheduled { border-left-color: var(--accent); }
    .task-card.completed { border-left-color: var(--green); color: var(--text-soft); text-decoration: line-through; }

    .panel-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 8px 0 6px;
    }

    /* === RECORDS PANEL === */
    .records-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .records-panel-top {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 12px;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-right: 12px;
      transition: max-height 0.2s;
      overflow: hidden;
      width: 156px;
      flex-shrink: 0;
      align-self: flex-start;
    }

    .records-panel-top.collapsed {
      max-height: 40px;
      margin-right: 8px;
    }

    .records-panel-top > div:first-child {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: stretch;
    }

    .records-toggle-btn {
      padding: 3px 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      border: 1px solid var(--border-strong);
      background: var(--surface);
      cursor: pointer;
      border-radius: var(--radius-sm);
      align-self: flex-end;
      height: 26px;
      width: 26px;
      transition: background .15s, color .15s;
    }
    .records-toggle-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-border); }

    .records-panel-top .form-group {
      display: contents;
    }

    .records-panel-top .form-group label {
      display: block;
      font-size: 10px;
    }

    .records-panel-top input[type="date"],
    .records-panel-top input[type="number"] {
      padding: 4px 6px;
      font-size: 11px;
      height: 24px;
    }

    .records-panel-top .btn {
      padding: 4px 10px;
      font-size: 11px;
      height: 24px;
    }


    .exercise-grid-top {
      display: flex;
      gap: 3px;
      grid-column: 6;
    }

    .ex-btn-top {
      padding: 6px 8px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--surface);
      cursor: pointer;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-align: center;
      transition: all 0.15s;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ex-btn-top:hover { background: var(--surface-muted); color: var(--text); }
    .ex-btn-top.active {
      background: var(--accent-soft);
      border-color: var(--accent-border);
      color: var(--accent-hover);
    }
    /* exercise type colors on the records-panel toggles (light tints) */
    .ex-btn-top[data-ex="muscleTraining"].active { background: #fdecec; border-color: #f0b9b9; color: #cf3a3a; }
    .ex-btn-top[data-ex="cardio"].active         { background: #eaf1ff; border-color: #c9dcff; color: #1d5be0; }
    .ex-btn-top[data-ex="hiit"].active           { background: #fce9f5; border-color: #eeb9dd; color: #c81f93; }

    .exercise-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .ex-btn {
      padding: 6px 2px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--surface);
      cursor: pointer;
      font-family: var(--font);
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-align: center;
      transition: all 0.15s;
    }
    .ex-btn:hover { background: var(--surface-muted); }
    .ex-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent-border);
      color: var(--accent-hover);
    }

    .streak-row {
      display: none;
    }

    .streak-chip {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 11px;
      font-size: 12px;
    }
    .streak-chip .streak-label { color: var(--text-muted); }
    .streak-chip .streak-num {
      font-weight: 700;
      color: var(--accent);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }

    /* === PERIOD BUTTONS === */
    .period-btn {
      padding: 8px 18px;
      border: 1px solid var(--border-strong);
      border-radius: 20px;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .period-btn:hover { background: var(--surface-muted); color: var(--text); }
    .period-btn.active {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    /* === DASHBOARD === */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 18px 20px;
      margin-bottom: 18px;
    }
    /* Dashboard: 実寸グラフを縦に並べてスクロール（潰さない） */
    .dash-inner {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 22px 24px;
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .dash-periods { flex: 0 0 auto; display: flex; gap: 8px; justify-content: center; }

    .chart-card {
      display: flex;
      flex-direction: column;
      min-height: 0;
      margin-bottom: 0;
    }
    .chart-card h3 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }
    /* Dashboard rows: charts side-by-side（高さは実寸固定） */
    .chart-row {
      display: grid;
      gap: 16px;
      flex: 0 0 auto;
    }
    .chart-row.two   { grid-template-columns: repeat(2, 1fr); }
    .chart-row.three { grid-template-columns: repeat(3, 1fr); }
    .chart-box { position: relative; flex: none; height: 300px; }
    /* Category gauge grid (3 columns: 筋トレ / 有酸素 / HIIT) */
    .ex-gauge-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: auto;
      gap: 12px;
      flex: 0 0 auto;
    }
    .ex-gauge-grid .chart-box { height: 160px; }
    .ex-gauge-card { padding: 12px 14px; }

<script>
  let DataManager; // assigned at startup via createDataManager(createSupabaseBackend(sb))

  // Exercise icon map
  const EX_ICON = {
    '腕立て': '💪', 'アブローラー': '🛞', 'スクワット': '🦵', '斜め懸垂': '🧗',
    'RUN': '🏃', 'WALKING': '🚶', 'BIKE': '🚲', 'HIIT': '🔥',
  };

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'dashboard') renderCharts().catch(e => showError('チャート読み込みエラー'));
    });
  });

  // ===== CALENDAR =====
  let currentMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
  let draggedId = null;

  const TODAY = (() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();

  function toDateStr(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  async function renderCalendar() {
    const y = currentMonth.getFullYear();
    const m = currentMonth.getMonth();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const firstDow = new Date(y, m, 1).getDay(); // 0=Sun

    // Month title
    document.getElementById('monthTitle').textContent =
      currentMonth.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long' });

    // Calendar grid
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    // Headers
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(day => {
      const h = document.createElement('div');
      h.className = 'cal-header-cell';
      h.textContent = day;
      grid.appendChild(h);
    });

    // Empty cells before day 1
    for (let i = 0; i < firstDow; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell empty';
      grid.appendChild(cell);
    }

    // Day cells
    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = toDateStr(y, m, day);
      const cell = document.createElement('div');
      cell.className = 'cal-cell' + (dateStr === TODAY ? ' today' : '');
      cell.dataset.date = dateStr;

      // Day number
      const num = document.createElement('div');
      num.className = 'cal-day-num';

      const dayDiv = document.createElement('div');
      dayDiv.textContent = day;
      num.appendChild(dayDiv);

      // Body data (weight / body fat)
      const bodyRec = await DataManager.getBody(dateStr);
      if (bodyRec && bodyRec.weight != null && bodyRec.bodyFat != null) {
        const bodyData = document.createElement('div');
        bodyData.className = 'cal-body-data';
        bodyData.textContent = `${bodyRec.weight}kg/${bodyRec.bodyFat}%`;
        num.appendChild(bodyData);
      }

      cell.appendChild(num);

      // Exercise icons
      const types = await DataManager.getExerciseTypes(dateStr);
      if (types.length) {
        const iconRow = document.createElement('div');
        iconRow.className = 'cal-exercise-icons';
        iconRow.textContent = types.map(t => EX_ICON[t] || '•').join('');
        cell.appendChild(iconRow);
      }

      // Click to select date
      cell.addEventListener('click', async e => {
        const di = document.getElementById('recordDate');
        if (di) di.value = dateStr;
        await renderRecordsPanel();
      });

      // Drop events
      cell.addEventListener('dragover', e => {
        e.preventDefault();
        cell.classList.add('drag-over');
      });
      cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
      cell.addEventListener('drop', async e => {
        e.preventDefault();
        cell.classList.remove('drag-over');
        if (!draggedId) return;
        await DataManager.updateTask(draggedId, { status: 'scheduled', date: dateStr });
        draggedId = null;
        await renderAll();
      });

      grid.appendChild(cell);
    }
  }

  function makeCalTaskChip(task) {
    const chip = document.createElement('div');
    chip.className = 'cal-task-chip';
    if (task.status === 'completed') chip.classList.add('completed');
    chip.textContent = task.name;
    chip.draggable = true;
    chip.dataset.taskId = task.id;

    chip.addEventListener('dragstart', e => {
      draggedId = task.id;
      chip.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    chip.addEventListener('dragend', () => chip.classList.remove('dragging'));

    chip.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (e.shiftKey) {
        // Shift+Click to toggle completed
        const newStatus = task.status === 'completed' ? 'scheduled' : 'completed';
        await DataManager.updateTask(task.id, { ...task, status: newStatus });
        await renderAll();
      } else {
        showTaskEditDialog(task);
      }
    });

    chip.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      showContextMenu(task, e.clientX, e.clientY);
    });

    return chip;
  }

  let currentContextTask = null;
  let currentContextMenuIndex = 0;

  function showContextMenu(task, x, y) {
    currentContextTask = task;
    currentContextMenuIndex = 0;

    const menu = document.getElementById('contextMenu');
    menu.innerHTML = '';
    menu.classList.remove('show');

    const items = [
      { label: '内容変更', action: 'edit' }
    ];

    // Add status-specific options
    if (task.status === 'completed') {
      items.push({ label: '未完に戻す', action: 'undo-complete' });
    } else if (task.status !== 'completed') {
      items.push({ label: '完了にする', action: 'complete' });
    }

    items.push({ label: '削除する', action: 'delete' });

    items.forEach((item, idx) => {
      const btn = document.createElement('button');
      btn.className = 'context-menu-item' + (idx === 0 ? ' selected' : '');
      btn.textContent = item.label;
      btn.dataset.action = item.action;
      btn.addEventListener('click', () => executeContextMenuAction(item.action));
      btn.addEventListener('mouseenter', () => {
        document.querySelectorAll('.context-menu-item').forEach(el => el.classList.remove('selected'));
        btn.classList.add('selected');
        currentContextMenuIndex = idx;
      });
      menu.appendChild(btn);
    });

    menu.style.left = x + 'px';
    menu.style.top = y + 'px';
    menu.classList.add('show');

    // Keyboard navigation
    const handleKeyDown = (e) => {
      const items = menu.querySelectorAll('.context-menu-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        currentContextMenuIndex = (currentContextMenuIndex + 1) % items.length;
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        currentContextMenuIndex = (currentContextMenuIndex - 1 + items.length) % items.length;
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const action = items[currentContextMenuIndex].dataset.action;
        executeContextMenuAction(action);
        return;
      } else if (e.key === 'Escape') {
        closeContextMenu();
        return;
      }

      items.forEach(el => el.classList.remove('selected'));
      items[currentContextMenuIndex].classList.add('selected');
    };

    document.addEventListener('keydown', handleKeyDown);
    document.addEventListener('click', closeContextMenu);

    menu._keyHandler = handleKeyDown;
  }

  function closeContextMenu() {
    const menu = document.getElementById('contextMenu');
    menu.classList.remove('show');
    document.removeEventListener('keydown', menu._keyHandler);
    document.removeEventListener('click', closeContextMenu);
  }

  async function executeContextMenuAction(action) {
    if (!currentContextTask) return;
    closeContextMenu();

    if (action === 'edit') {
      showTaskEditDialog(currentContextTask);
    } else if (action === 'complete') {
      await DataManager.updateTask(currentContextTask.id, { ...currentContextTask, status: 'completed' });
      await renderAll();
    } else if (action === 'undo-complete') {
      await DataManager.updateTask(currentContextTask.id, { ...currentContextTask, status: 'scheduled' });
      await renderAll();
    } else if (action === 'delete') {
      await DataManager.deleteTask(currentContextTask.id);
      await renderAll();
    }
  }

  function showTaskEditDialog(task) {
    const name = prompt('タスク名:', task.name);
    if (name === null) return;

    // Status selection via confirm dialogs
    let status = task.status;
    const statusOptions = [
      { label: '💡 IDEA', value: 'idea' },
      { label: '📅 SCHEDULED', value: 'scheduled' },
      { label: '✅ COMPLETED', value: 'completed' }
    ];

    // Show current status and ask for change
    const changeStatus = confirm(`現在: ${status}\n\nステータスを変更しますか？`);
    if (changeStatus) {
      // Show status selector
      const newStatus = prompt(
        'ステータスを選択:\n1 = IDEA\n2 = SCHEDULED\n3 = COMPLETED',
        '1'
      );
      if (newStatus !== null) {
        if (newStatus === '1') status = 'idea';
        else if (newStatus === '2') status = 'scheduled';
        else if (newStatus === '3') status = 'completed';
      }
    }

    DataManager.updateTask(task.id, { name, status, date: task.date })
      .then(() => renderAll())
      .catch(e => { showError('保存に失敗しました: ' + e.message); console.error(e); });
  }

  // (タスク機能は廃止: deleteZone ドロップ削除は無効化)

  async function prevMonth() {
    currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1);
    try { await renderCalendar(); }
    catch (e) { showError('接続できません。通信環境を確認してください'); console.error(e); }
  }
  async function nextMonth() {
    currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1);
    try { await renderCalendar(); }
    catch (e) { showError('接続できません。通信環境を確認してください'); console.error(e); }
  }

  // ===== TASK PANEL =====
  async function renderTaskPanel() {
    const panel = document.getElementById('leftPanel');

    // Create or reuse taskSection
    let taskSection = document.getElementById('taskSection');
    if (!taskSection) {
      taskSection = document.createElement('div');
      taskSection.id = 'taskSection';
      panel.appendChild(taskSection);
    }

    const ideaTasks      = await DataManager.getTasksByStatus('idea');
    const scheduledTasks = await DataManager.getTasksByStatus('scheduled');
    const completedTasks = await DataManager.getTasksByStatus('completed');

    taskSection.innerHTML = `
      <div class="task-section-title">IDEA</div>
      <div class="task-input-row">
        <input type="text" id="taskInput" placeholder="新しいタスク..." />
        <button onclick="handleAddTask()">+</button>
      </div>
      <div class="task-pool" id="poolIdea"></div>
      <hr class="panel-divider">
      <div class="task-section-title">SCHEDULED</div>
      <div class="task-pool" id="poolScheduled"></div>
      <hr class="panel-divider">
      <div class="task-section-title">COMPLETED</div>
      <div class="task-pool" id="poolCompleted"></div>
    `;

    // Add color classes to section titles
    const titles = taskSection.querySelectorAll('.task-section-title');
    titles[0].classList.add('idea');
    titles[1].classList.add('scheduled');
    titles[2].classList.add('completed');

    // Populate pools
    ideaTasks.forEach(t      => document.getElementById('poolIdea').appendChild(makeTaskCard(t)));
    scheduledTasks.forEach(t => document.getElementById('poolScheduled').appendChild(makeTaskCard(t)));
    completedTasks.forEach(t => document.getElementById('poolCompleted').appendChild(makeTaskCard(t)));

    // Enter key on input
    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleAddTask();
    });
  }

  function makeTaskCard(task) {
    const card = document.createElement('div');
    card.className = 'task-card' + (task.status !== 'idea' ? ' ' + task.status : '');
    card.draggable = true;
    card.dataset.taskId = task.id;

    // Display content with checkmark if completed
    const content = task.status === 'completed' ? `✓ ${task.name}` : task.name;
    card.textContent = content;

    card.addEventListener('dragstart', e => {
      draggedId = task.id;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));

    // Click to edit or Shift+Click to toggle completed
    card.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (e.shiftKey) {
        const newStatus = task.status === 'completed' ? 'scheduled' : 'completed';
        await DataManager.updateTask(task.id, { ...task, status: newStatus });
        await renderAll();
      } else {
        showTaskEditDialog(task);
      }
    });

    // Right-click to show context menu
    card.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      showContextMenu(task, e.clientX, e.clientY);
    });

    return card;
  }

  async function handleAddTask() {
    const input = document.getElementById('taskInput');
    if (!input) return;
    const name = input.value.trim();
    if (!name) return;
    await DataManager.addTask(name);
    input.value = '';
    await renderAll();
  }

  // ===== RECORDS PANEL =====
  async function renderRecordsPanel() {
    const container = document.getElementById('recordsPanelContainer');
    if (!container) return;

    // Get selected date (preserve existing selection, default to TODAY)
    const existingInput = document.getElementById('recordDate');
    const selectedDate = existingInput ? existingInput.value : TODAY;

    // Get stored data for selected date
    const bodyRec = await DataManager.getBody(selectedDate) || {};
    const exTypes = DataManager.EXERCISE_TYPES;
    const exOptions = exTypes.map(t => `<option value="${t}">${EX_ICON[t] || ''} ${t}</option>`).join('');
    const exDetails = await DataManager.getExerciseDetails(selectedDate);
    const exList = exDetails.length
      ? exDetails.map(e => `
        <div class="ex-detail-row">
          <span>${EX_ICON[e.type] || '•'} ${e.type}</span>
          <span style="display:flex; align-items:center; gap:8px;">
            <span class="ex-detail-text">${e.detail ? e.detail : ''}</span>
            <button class="ex-del-btn" data-type="${e.type}" title="削除"
                    style="border:none; background:none; color:var(--text-soft); cursor:pointer; font-size:13px; line-height:1; padding:2px;">✕</button>
          </span>
        </div>`).join('')
      : '<div class="ex-detail-empty">記録なし</div>';

    container.innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
        <div style="font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.7px; color:var(--text-muted);">記録</div>
        <button class="records-toggle-btn" onclick="toggleRecordsPanel()" title="折りたたむ/展開">−</button>
      </div>
      <div style="display: flex; flex-direction: column; gap: 6px;">
        <div class="form-group">
          <label>日付</label>
          <input type="date" id="recordDate" value="${selectedDate}" />
        </div>
        <div class="form-group">
          <label>体重 (kg)</label>
          <input type="number" step="0.05" inputmode="decimal" id="recordWeight"
                 value="${bodyRec.weight ?? ''}" placeholder="--" />
        </div>
        <div class="form-group">
          <label>体脂肪 (%)</label>
          <input type="number" step="0.1" inputmode="decimal" id="recordBodyFat"
                 value="${bodyRec.bodyFat ?? ''}" placeholder="--" />
        </div>
        <button class="btn btn-primary" id="saveBodyBtn">保存</button>
        <div id="bodySaveMsg" style="font-size:10px; font-weight:600; min-height:12px;"></div>

        <div class="form-group" style="margin-top:8px;">
          <label>トレーニング</label>
          <div style="display:flex; gap:6px;">
            <select id="exType" style="flex:1.1; min-width:0; padding:9px 8px; border:1px solid var(--border-strong); border-radius:var(--radius-sm); font-family:var(--font); font-size:13px; color:var(--text); background:var(--surface);">
              ${exOptions}
            </select>
            <input type="text" id="exDetail" inputmode="text" placeholder="回数・距離 (任意)" style="flex:1; min-width:0;" />
          </div>
        </div>
        <button class="btn btn-primary" id="saveExBtn">運動を記録</button>
        <div id="exSaveMsg" style="font-size:10px; font-weight:600; min-height:12px;"></div>
      </div>
      <div class="ex-detail-list" style="display: flex; flex-direction: column; gap: 3px; margin-top: 6px;">
        ${exList}
      </div>
    `;

    // Bind date change event
    document.getElementById('recordDate').addEventListener('change', async () => {
      await renderRecordsPanel();
      await renderCalendar();
    });

    // Bind body-record save
    document.getElementById('saveBodyBtn').addEventListener('click', handleSaveBody);
    // Bind exercise save + per-row delete
    document.getElementById('saveExBtn').addEventListener('click', handleSaveExercise);
    container.querySelectorAll('.ex-del-btn').forEach(b => {
      b.addEventListener('click', () => handleRemoveExercise(b.dataset.type));
    });
  }

  async function handleSaveExercise() {
    const date = document.getElementById('recordDate').value;
    const type = document.getElementById('exType').value;
    const detail = document.getElementById('exDetail').value.trim();
    const msg = document.getElementById('exSaveMsg');
    if (!date || !type) { msg.style.color = 'var(--amber)'; msg.textContent = '種目を選択'; return; }
    try {
      await DataManager.setExercise(date, type, detail || null);
      msg.style.color = 'var(--green)';
      msg.textContent = `${type} を記録しました`;
      await renderRecordsPanel();
      await renderCalendar();
    } catch (e) {
      msg.style.color = 'var(--amber)';
      msg.textContent = '記録に失敗';
      showError('運動の記録に失敗しました: ' + e.message);
      console.error(e);
    }
  }

  async function handleRemoveExercise(type) {
    const date = document.getElementById('recordDate').value;
    try {
      await DataManager.removeExercise(date, type);
      await renderRecordsPanel();
      await renderCalendar();
    } catch (e) {
      showError('運動の削除に失敗しました: ' + e.message);
      console.error(e);
    }
  }

  async function handleSaveBody() {
    const date = document.getElementById('recordDate').value;
    const weight = document.getElementById('recordWeight').value.trim();
    const bodyFat = document.getElementById('recordBodyFat').value.trim();
    const msg = document.getElementById('bodySaveMsg');
    if (weight === '' || bodyFat === '') {
      msg.style.color = 'var(--amber)';
      msg.textContent = '体重と体脂肪を入力';
      return;
    }
    try {
      await DataManager.setBody(date, weight, bodyFat);
      msg.style.color = 'var(--green)';
      msg.textContent = '保存しました';
      await renderCalendar();
    } catch (e) {
      msg.style.color = 'var(--amber)';
      msg.textContent = '保存に失敗';
      showError('保存に失敗しました: ' + e.message);
      console.error(e);
    }
  }

  function toggleRecordsPanel() {
    const container = document.getElementById('recordsPanelContainer');
    if (!container) return;
    container.classList.toggle('collapsed');
    const btn = container.querySelector('.records-toggle-btn');
    if (btn) {
      btn.textContent = container.classList.contains('collapsed') ? '＋' : '−';
    }
  }

  async function renderStreaks() {
    const streakRow = document.getElementById('streakRow');
    if (!streakRow) return;

    // Helper: count consecutive days backward from TODAY where pred(dateStr) is truthy
    async function calcStreak(pred) {
      let count = 0;
      const [y, mo, d] = TODAY.split('-').map(Number);
      let cur = new Date(y, mo - 1, d);
      while (true) {
        const dateStr = toDateStr(cur.getFullYear(), cur.getMonth(), cur.getDate());
        if (!await pred(dateStr)) break;
        count++;
        cur.setDate(cur.getDate() - 1);
      }
      return count;
    }

    const cards = [
      { icon: '💪', label: '筋トレ連続', count: await calcStreak(d => DataManager.hasStrength(d)) },
      { icon: '🏃', label: 'RUN連続',    count: await calcStreak(d => DataManager.hasExercise(d, 'RUN')) },
      { icon: '⚡', label: 'HIIT連続',   count: await calcStreak(d => DataManager.hasExercise(d, 'HIIT')) },
      { icon: '✅', label: 'タスク連続', count: await calcStreak(async d => (await DataManager.getTasksByDate(d)).length > 0) },
    ];

    streakRow.innerHTML = cards.map(s => `
      <div class="streak-chip">
        <span class="streak-label">${s.icon} ${s.label}</span>
        <span class="streak-num">${s.count}日</span>
      </div>
    `).join('');
  }

  // ===== MAIN RENDER & INIT =====
  async function renderAll() {
    await renderCalendar();
    await renderRecordsPanel();
    await renderStreaks();
  }

  // ===== DASHBOARD =====
  let activePeriod = 30;
  let charts = {};

  function setPeriod(days, btn) {
    activePeriod = days;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCharts().catch(e => showError('チャート読み込みエラー'));
  }

  function destroyChart(id) {
    if (charts[id]) {
      charts[id].destroy();
      delete charts[id];
    }
  }

  async function renderCharts() {
    if (!DataManager) return;
    // Scan a date range to gather body and exercise records
    const today = new Date();
    const startDate = new Date(today);
    startDate.setFullYear(startDate.getFullYear() - 1); // look back up to 1 year

    // Build date list
    const dates = [];
    for (let d = new Date(startDate); d <= today; d.setDate(d.getDate() + 1)) {
      dates.push(toDateStr(d.getFullYear(), d.getMonth(), d.getDate()));
    }

    // Calculate cutoff date
    let cutoff = null;
    if (activePeriod > 0) {
      const d = new Date();
      d.setDate(d.getDate() - activePeriod);
      cutoff = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    // Fetch body records for date range
    const bodyRecords = [];
    for (const date of dates) {
      if (cutoff && date < cutoff) continue;
      const rec = await DataManager.getBody(date);
      if (rec && rec.weight != null && rec.bodyFat != null) bodyRecords.push(rec);
    }
    bodyRecords.sort((a, b) => a.date < b.date ? -1 : 1);

    // Destroy existing charts (weight/bf + dynamic exgauge-*)
    Object.keys(charts).forEach(destroyChart);

    // --- Line charts (weight & body fat) ---
    if (bodyRecords.length > 0) {
      const labels = bodyRecords.map(r => r.date);

      // Weight line chart
      const weightCtx = document.getElementById('weightChart').getContext('2d');
      charts['weightChart'] = new Chart(weightCtx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: '体重 (kg)',
            data: bodyRecords.map(r => r.weight),
            borderColor: '#2f6df6',
            backgroundColor: 'rgba(47,109,246,0.10)',
            fill: true,
            tension: 0.4,
            pointRadius: 3,
            pointBackgroundColor: '#2f6df6',
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: false } }
        }
      });

      // Body fat line chart
      const bfCtx = document.getElementById('bfChart').getContext('2d');
      charts['bfChart'] = new Chart(bfCtx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: '体脂肪率 (%)',
            data: bodyRecords.map(r => r.bodyFat),
            borderColor: '#c77514',
            backgroundColor: 'rgba(199,117,20,0.10)',
            fill: true,
            tension: 0.4,
            pointRadius: 3,
            pointBackgroundColor: '#c77514',
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: false } }
        }
      });
    }

    // --- Category donut gauges + per-exercise breakdown (over the selected period) ---
    const filteredDates = cutoff ? dates.filter(d => d >= cutoff) : dates;
    const totalDays = filteredDates.length;

    // Categories: a day counts as "achieved" if any of its member types was done.
    const categories = [
      { key: 'strength', emoji: '💪', label: '筋トレ',  color: '#d61f2b',
        types: ['腕立て', 'アブローラー', 'スクワット', '斜め懸垂'], breakdown: true },
      { key: 'aerobic',  emoji: '🏃', label: '有酸素',  color: '#1f5fe0',
        types: ['RUN', 'WALKING', 'BIKE'], breakdown: true },
      { key: 'hiit',     emoji: '⚡', label: 'HIIT',    color: '#c4119a',
        types: ['HIIT'], breakdown: false },
    ];

    // Single pass over the period: tally category-achieved days and per-type day counts.
    const catDone = {};
    const typeDays = {};
    for (const c of categories) {
      catDone[c.key] = 0;
      for (const t of c.types) typeDays[t] = 0;
    }
    for (const date of filteredDates) {
      const todays = new Set(await DataManager.getExerciseTypes(date));
      for (const c of categories) {
        if (c.types.some(t => todays.has(t))) catDone[c.key]++;
        for (const t of c.types) if (todays.has(t)) typeDays[t]++;
      }
    }

    // Build the 3 category cards (donut + optional breakdown table).
    const exGrid = document.getElementById('exGaugeGrid');
    if (exGrid) {
      exGrid.innerHTML = categories.map((c, i) => {
        const table = c.breakdown
          ? `<table class="ex-breakdown"><tbody>` +
            c.types.map(t =>
              `<tr><td>${EX_ICON[t]} ${t}</td><td>${typeDays[t]}日</td></tr>`).join('') +
            `</tbody></table>`
          : '';
        return `
        <div class="chart-card ex-gauge-card">
          <h3>${c.emoji} ${c.label}</h3>
          <div class="chart-box gauge-box">
            <canvas id="exgauge-${i}"></canvas>
            <div class="gauge-center" id="exgauge-${i}-c"></div>
          </div>
          ${table}
        </div>`;
      }).join('');
    }

    for (let i = 0; i < categories.length; i++) {
      const { key, color } = categories[i];
      const chartId = `exgauge-${i}`;
      const gaugeId = `exgauge-${i}-c`;
      const done = catDone[key];
      const remaining = Math.max(totalDays - done, 0);
      const pct = totalDays > 0 ? Math.min(Math.round((done / totalDays) * 100), 100) : 0;

      const ctx = document.getElementById(chartId).getContext('2d');
      charts[chartId] = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['達成', '未達成'],
          datasets: [{
            data: [done, remaining || (done === 0 ? 1 : 0)],
            backgroundColor: [color, '#eaedf2'],
            borderWidth: 0,
            hoverOffset: 0,
          }]
        },
        options: {
          cutout: '72%',
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { enabled: false } }
        }
      });

      // Center label
      const gauge = document.getElementById(gaugeId);
      if (gauge) {
        gauge.innerHTML =
          `<div class="gauge-pct" style="color:${color}">${pct}%</div>` +
          `<div class="gauge-sub">${done}/${totalDays}日</div>`;
      }
    }
  }

  // ===== STARTUP (認証なし: anon キーで直接接続) =====
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: false, autoRefreshToken: false },
  });

  function showError(msg) {
    const el = document.getElementById('app-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function startApp() {
    DataManager = createDataManager(createCachingBackend(createSupabaseBackend(sb)));
    try {
      await renderAll();
      // Dashboard is the default tab, so render its charts on load.
      renderCharts().catch(e => showError('チャート読み込みエラー'));
    } catch (e) {
      showError('接続できません。通信環境を確認してください');
      console.error(e);
    }
  }

  startApp();
</script>
